<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <aside class="tool-rail" aria-label="Main actions">
        <button
            id="rail-toggle-btn"
            class="tool-rail-btn tool-rail-toggle"
            type="button"
            aria-label="Collapse toolbar"
            title="Collapse toolbar"
        >
            <span class="tool-rail-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                    <path d="M4 7h16"></path>
                    <path d="M4 12h16"></path>
                    <path d="M4 17h16"></path>
                </svg>
            </span>
        </button>

        <div class="tool-rail-actions">
            <button
                id="open-file-btn"
                class="tool-rail-btn"
                type="button"
                aria-label="Open file"
                title="Open File (Ctrl+O)"
            >
                <span class="tool-rail-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <path d="M3.5 8.5h5l2-2h4.75A1.75 1.75 0 0 1 17 8.25v1.25"></path>
                        <path d="M3.5 8.5h17l-1.35 8.1a1.9 1.9 0 0 1-1.88 1.58H5.73a1.9 1.9 0 0 1-1.88-1.58L2.5 9.5"></path>
                    </svg>
                </span>
            </button>
            <button
                id="toggle-comments-btn"
                class="tool-rail-btn"
                type="button"
                aria-label="Toggle comments"
                title="Toggle Comments (Ctrl+])"
            >
                <span class="tool-rail-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <path d="M6 7.5h12A2.5 2.5 0 0 1 20.5 10v5A2.5 2.5 0 0 1 18 17.5H10l-4.5 3V17.5H6A2.5 2.5 0 0 1 3.5 15v-5A2.5 2.5 0 0 1 6 7.5Z"></path>
                        <path d="M8 11h8"></path>
                        <path d="M8 14h5"></path>
                    </svg>
                </span>
            </button>
            <button
                id="theme-toggle-btn"
                class="tool-rail-btn"
                type="button"
                aria-label="Toggle theme"
                title="Toggle Theme (Ctrl+D)"
            >
                <span class="tool-rail-icon" id="theme-icon" aria-hidden="true"></span>
            </button>
        </div>
    </aside>

    <div class="app-shell">
        <div class="status-banner" id="status-banner" aria-live="polite" aria-atomic="true"></div>

        <div class="app-container">
            <!-- Welcome / empty state -->
            <div class="welcome-screen" id="welcome-screen">
                <div class="welcome-content">
                    <h2>Hermes</h2>
                    <p>Lightweight DOCX Viewer</p>
                    <button id="welcome-open-btn" class="primary-btn">Open DOCX File</button>
                    <p class="hint">or drag and drop a .docx file here</p>
                    <div class="recent-files" id="recent-files-section">
                        <h3>Recent files</h3>
                        <div class="recent-files-list" id="recent-files-list">
                            <p class="recent-files-empty">Loading recent files...</p>
                        </div>
                    </div>
                    <p class="file-info" id="file-info"></p>
                </div>
            </div>

            <!-- Document view -->
            <div class="document-view" id="document-view" style="display: none;">
                <div class="desk" id="desk">
                    <!-- Pages rendered here -->
                </div>
                <aside class="comments-panel" id="comments-panel" style="display: none;">
                    <div class="comments-header">
                        <h3>Comments</h3>
                        <button id="close-comments-btn" class="close-btn">&times;</button>
                    </div>
                    <div class="comments-list" id="comments-list">
                    </div>
                </aside>
            </div>
        </div>

        <!-- Find bar -->
        <div class="find-bar" id="find-bar" style="display: none;">
            <input type="text" id="find-input" placeholder="Find in document..." />
            <span id="find-count"></span>
            <button id="find-prev-btn">&#9650;</button>
            <button id="find-next-btn">&#9660;</button>
            <button id="find-close-btn">&times;</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
